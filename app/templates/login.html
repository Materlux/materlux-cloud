<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Materlux — Acesso</title>
<style>
  :root{--rose:#b76e79;--ink:#3a2c31;--bg:#f7f1ef}
  *{box-sizing:border-box;font-family:-apple-system,Segoe UI,Roboto,sans-serif}
  body{margin:0;height:100vh;display:grid;place-items:center;background:var(--bg);color:var(--ink)}
  .card{background:#fff;padding:38px 34px;border-radius:16px;box-shadow:0 12px 40px rgba(0,0,0,.10);width:340px}
  h1{margin:0 0 4px;font-size:22px}.sub{margin:0 0 22px;color:#8a7a7e;font-size:13px}
  label{display:block;font-size:13px;margin:14px 0 5px;font-weight:600}
  input{width:100%;padding:11px 12px;border:1px solid #e3d7d5;border-radius:9px;font-size:15px}
  button{width:100%;margin-top:22px;padding:12px;border:0;border-radius:9px;background:var(--rose);
    color:#fff;font-size:15px;font-weight:600;cursor:pointer}
  button:hover{filter:brightness(1.05)}
  .err{color:#c0392b;font-size:13px;margin-top:14px;min-height:16px;text-align:center}
</style></head>
<body>
  <form class="card" onsubmit="return doLogin(event)">
    <h1>Materlux</h1>
    <p class="sub">Sistema de agenda e prontuário</p>
    <label>Usuário</label>
    <input id="u" autocomplete="username" autofocus required>
    <label>Senha</label>
    <input id="p" type="password" autocomplete="current-password" required>
    <button type="submit">Entrar</button>
    <div class="err" id="err"></div>
  </form>
<script>
async function doLogin(e){
  e.preventDefault();
  const fd=new FormData();
  fd.append('username',document.getElementById('u').value);
  fd.append('password',document.getElementById('p').value);
  const r=await fetch('/api/login',{method:'POST',body:fd});
  if(r.ok){location.href='/app';}
  else{document.getElementById('err').textContent='Usuário ou senha inválidos';}
  return false;
}
</script>
</body></html>
